name: Netlify Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - development
      - master

permissions:
  pull-requests: write
  contents: read

jobs:
  deploy_preview:
    name: Deploy preview to Netlify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
        run: bun run build

      - name: Install Netlify CLI
        run: bun install netlify-cli@17.10.1 -g

      - name: Deploy to Netlify
        id: netlify_deploy
        run: |
          netlify deploy \
            --dir build \
            --site ${{ secrets.NETLIFY_SITE_ID }} \
            --auth ${{ secrets.NETLIFY_API_TOKEN }} \
            --json \
            > deploy_output.json

      - name: Extract preview URL
        id: preview_url
        run: |
          NETLIFY_PREVIEW_URL=$(jq -r '.deploy_url' deploy_output.json)
          echo "NETLIFY_PREVIEW_URL=$NETLIFY_PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          NETLIFY_PREVIEW_URL: ${{ steps.preview_url.outputs.NETLIFY_PREVIEW_URL }}
        with:
          script: |
            const COMMENT_IDENTIFIER = `<!-- preview-deploy-notice -->`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.data.find(c => c.body.includes(COMMENT_IDENTIFIER));

            const body = [
              COMMENT_IDENTIFIER,
              `### ✅ Preview deployed`,
              `| | |`,
              `|---|---|`,
              `| **Branch** | \`${context.payload.pull_request.head.ref}\` |`,
              `| **URL** | ${process.env.NETLIFY_PREVIEW_URL} |`,
              `| **Commit** | \`${context.payload.pull_request.head.sha.slice(0, 7)}\` |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
